- clean:
    ~/:
      recursive: false
    ~/.config/nvim:
      recursive: true
- defaults:
    link:
      relink: true
      force: true
      relative: true
- create:
    - ~/.config/nvim/lua
    - ~/.config/nvim/UltiSnips
    - ~/.gnupg
    - ~/.local/share/fonts
    - ~/.local/alerts/emails
    - ~/.local/alerts/logs
- link:
    ~/.gitconfig: gitconfig
    ~/.gnupg/gpg-agent.conf: gpg-agent.conf
    ~/.tmux.conf: tmux.conf
    ~/.zshrc: zshrc
    ~/.local/alerts/alert-monitor: alerts/alert-monitor
    ~/.local/alerts/triage.md: alerts/triage.md
    ~/.local/alerts/critical-alert.md: alerts/critical-alert.md
    ~/.local/alerts/run.sh: alerts/run.sh
    ~/.local/alerts/README.md: alerts/README.md
    ~/.local/share/fonts:
      glob: true
      path: fonts/*
      recursive: true
    ~/.config:
      glob: true
      path: config/*
      recursive: true
- shell:
    - [cd alerts && go build -o alert-monitor ./alert-monitor.go, Building alert-monitor...]
    - [fc-cache -f -v, Installing Fonts...]
    - [./tmux_install_plugins.sh, Installing tmux plugins.]
